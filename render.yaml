# ═══════════════════════════════════════════════════════════
# Render.com — Blueprint per deploy automatico
# ═══════════════════════════════════════════════════════════
services:
  - type: web
    name: transitintel-api
    runtime: node
    plan: free
    buildCommand: pnpm install --prod=false && pnpm run build:deploy && python3 -m pip install --user -r requirements.txt
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: PYTHONPATH
        value: /opt/render/project/src/scripts
      - key: PATH
        value: /opt/render/project/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - key: CRON_SECRET
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
