openapi: 3.1.0
info:
  title: TransitIntel API
  version: 0.2.0
  description: TransitIntel — Public transport planning intelligence platform for Provincia di Ancona
servers:
  - url: /api
    description: Base API path

security: []   # Public API — no authentication required

tags:
  - name: health
    description: Health-check
  - name: traffic
    description: Traffic data and analysis
  - name: poi
    description: Points of interest
  - name: population
    description: Population density & choropleth
  - name: stops
    description: Bus stop management
  - name: routes
    description: Bus route management
  - name: analysis
    description: Territorial & service analysis
  - name: cron
    description: Scheduled data sync (cron)
  - name: admin
    description: Admin manual sync
  - name: gtfs-upload
    description: GTFS feed upload & management
  - name: gtfs-queries
    description: GTFS basic queries (stops, routes, shapes, summary, stats, analysis)
  - name: gtfs-analysis
    description: GTFS advanced analysis (bands, impact, network)
  - name: gtfs-travel
    description: GTFS travel-time, trips & stop directory
  - name: scenarios
    description: KML scenario management & service-program generation
  - name: scenario-programs
    description: Scenario service-program CRUD, calendars, GTFS export
  - name: calendar-presets
    description: Calendar preset definitions
  - name: intermodal
    description: Intermodal hubs & passenger analysis
  - name: optimizer-route
    description: Route/stop-placement optimizer
  - name: optimizer-schedule
    description: Schedule optimizer (CP-SAT & greedy)
  - name: service-program
    description: Vehicle service-program (greedy + CP-SAT)
  - name: driver-shifts
    description: Driver-shift generation (greedy + CP-SAT + async jobs)
  - name: clusters
    description: Stop-cluster management
  - name: coincidence-zones
    description: Coincidence zone management (intermodal, bus-bus, P&R)
  - name: settings
    description: Application settings
  - name: territory
    description: Territory overview & deep analysis
  - name: weather
    description: Weather data collection and correlation with traffic

# ════════════════════════════════════════════════════════════════
#  PATHS
# ════════════════════════════════════════════════════════════════
paths:

  # ── Health ────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Traffic ───────────────────────────────────────────────────
  /traffic:
    get:
      operationId: getTraffic
      tags: [traffic]
      summary: Latest traffic snapshots
      parameters:
        - name: from
          in: query
          schema: { type: string }
        - name: to
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrafficSnapshot"
                  total:
                    type: integer

  /traffic/heatmap:
    get:
      operationId: getTrafficHeatmap
      tags: [traffic]
      summary: Aggregated traffic heatmap
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrafficHeatmapPoint"

  /traffic/stats:
    get:
      operationId: getTrafficStats
      tags: [traffic]
      summary: Traffic statistics with day-type breakdown
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficStats"

  /traffic/availability:
    get:
      operationId: getTrafficAvailability
      tags: [traffic]
      summary: Check if traffic data is available
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  count:
                    type: integer
                  lastUpdated:
                    type: string
                    format: date-time

  # ── POI ───────────────────────────────────────────────────────
  /poi:
    get:
      operationId: getPoi
      tags: [poi]
      summary: Points of interest
      parameters:
        - name: categories
          in: query
          schema: { type: string }
          description: Comma-separated categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Poi"
                  total:
                    type: integer

  # ── Population ────────────────────────────────────────────────
  /population/density:
    get:
      operationId: getPopulationDensity
      tags: [population]
      summary: Census sections with density
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CensusSection"
                  total:
                    type: integer

  /population/choropleth:
    get:
      operationId: getPopulationChoropleth
      tags: [population]
      summary: GeoJSON FeatureCollection for choropleth rendering
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    enum: [FeatureCollection]
                  features:
                    type: array
                    items:
                      type: object

  # ── Stops ─────────────────────────────────────────────────────
  /stops:
    get:
      operationId: getStops
      tags: [stops]
      summary: List all bus stops
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusStop"
                  total:
                    type: integer
    post:
      operationId: createStop
      tags: [stops]
      summary: Create a bus stop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusStop"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusStop"

  /stops/{id}:
    put:
      operationId: updateStop
      tags: [stops]
      summary: Update a bus stop
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusStop"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusStop"
    delete:
      operationId: deleteStop
      tags: [stops]
      summary: Delete a bus stop
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted

  /stops/{id}/nearby:
    get:
      operationId: getStopNearby
      tags: [stops]
      summary: Nearby POI & population for a stop
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopNearbyData"

  # ── Routes (bus) ──────────────────────────────────────────────
  /routes:
    get:
      operationId: getRoutes
      tags: [routes]
      summary: List all bus routes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusRoute"
                  total:
                    type: integer
    post:
      operationId: createRoute
      tags: [routes]
      summary: Create a bus route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusRoute"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusRoute"

  /routes/{id}:
    delete:
      operationId: deleteRoute
      tags: [routes]
      summary: Delete a bus route
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted

  # ── Analysis ──────────────────────────────────────────────────
  /analysis/coverage:
    get:
      operationId: getAnalysisCoverage
      tags: [analysis]
      summary: Stop coverage analysis
      parameters:
        - name: radiusKm
          in: query
          schema: { type: number, default: 0.5 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/demand-score:
    get:
      operationId: getAnalysisDemandScore
      tags: [analysis]
      summary: Demand score grid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        cellId: { type: string }
                        lng: { type: number }
                        lat: { type: number }
                        score: { type: number }
                        populationScore: { type: number }
                        poiScore: { type: number }
                        trafficScore: { type: number }
                        hasStop: { type: boolean }
                        source: { type: string }

  /analysis/underserved:
    get:
      operationId: getAnalysisUnderserved
      tags: [analysis]
      summary: Underserved areas
      parameters:
        - name: minScore
          in: query
          schema: { type: number }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        cellId: { type: string }
                        lng: { type: number }
                        lat: { type: number }
                        score: { type: number }
                        populationScore: { type: number }
                        poiScore: { type: number }
                        trafficScore: { type: number }
                        hasStop: { type: boolean }
                        nearestStopDistanceMeters: { type: number }
                        suggestedStopLng: { type: number }
                        suggestedStopLat: { type: number }
                        populationAffected: { type: number }
                        topPoiCategories:
                          type: array
                          items: { type: string }
                        source: { type: string }
                  total: { type: integer }

  /analysis/demand:
    get:
      operationId: getAnalysisDemand
      tags: [analysis]
      summary: Demand analysis (population + POI combined)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/stats:
    get:
      operationId: getAnalysisStats
      tags: [analysis]
      summary: Dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/isochrone:
    get:
      operationId: getAnalysisIsochrone
      tags: [analysis]
      summary: Isochrone contours from a point
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number }
        - name: lng
          in: query
          required: true
          schema: { type: number }
        - name: minutes
          in: query
          schema: { type: integer, default: 15 }
        - name: provider
          in: query
          schema:
            type: string
            enum: [auto, mapbox, ors]
            default: auto
          description: Isochrone provider. "auto" tries Mapbox then ORS as fallback.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string }
                  features:
                    type: array
                    items:
                      type: object
                  provider: { type: string }

  /analysis/walkability-coverage:
    get:
      operationId: getAnalysisWalkabilityCoverage
      tags: [analysis]
      summary: Walkability coverage analysis
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/service-quality:
    get:
      operationId: getAnalysisServiceQuality
      tags: [analysis]
      summary: Service quality analysis (frequency, punctuality, coverage)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/route-shapes:
    get:
      operationId: getAnalysisRouteShapes
      tags: [analysis]
      summary: Route shape GeoJSON for analysis map
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /analysis/segments:
    get:
      operationId: getAnalysisSegments
      tags: [analysis]
      summary: Route segment analysis
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  # ── Territory ─────────────────────────────────────────────────
  /territory/overview:
    get:
      operationId: getTerritoryOverview
      tags: [territory]
      summary: Territory overview (population, POI, stops per comune)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /territory/deep:
    get:
      operationId: getTerritoryDeep
      tags: [territory]
      summary: Deep territory analysis
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  # ── Cron ──────────────────────────────────────────────────────
  /cron/traffic:
    post:
      operationId: cronTraffic
      tags: [cron]
      summary: Sync traffic from TomTom
      parameters:
        - name: x-cron-secret
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronResult"

  /cron/poi:
    post:
      operationId: cronPoi
      tags: [cron]
      summary: Sync POI from OSM Overpass
      parameters:
        - name: x-cron-secret
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronResult"

  /cron/population:
    post:
      operationId: cronPopulation
      tags: [cron]
      summary: Sync census data from ISTAT (live API with static fallback)
      parameters:
        - name: x-cron-secret
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CronResult"
                  - type: object
                    properties:
                      source: { type: string, description: "istat-api or static-fallback" }

  # ── Weather ───────────────────────────────────────────────────
  /cron/weather:
    post:
      operationId: cronWeather
      tags: [cron, weather]
      summary: Fetch weather snapshots from OpenWeatherMap for province locations
      parameters:
        - name: x-cron-secret
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  inserted: { type: integer }
                  errors: { type: integer }

  /weather/current:
    get:
      operationId: getWeatherCurrent
      tags: [weather]
      summary: Latest weather snapshot per monitored location
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherSnapshot"

  /weather/history:
    get:
      operationId: getWeatherHistory
      tags: [weather]
      summary: Weather history (configurable lookback)
      parameters:
        - name: hours
          in: query
          schema: { type: integer, default: 24 }
          description: Number of hours to look back
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherSnapshot"

  /weather/correlation:
    get:
      operationId: getWeatherCorrelation
      tags: [weather]
      summary: Correlation between weather conditions and traffic congestion
      parameters:
        - name: hours
          in: query
          schema: { type: integer, default: 168 }
          description: Number of hours to look back for correlation analysis
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    weather_main: { type: string }
                    sample_count: { type: integer }
                    avg_congestion: { type: number }
                    avg_speed_kmh: { type: number }
                    avg_temp: { type: number }
                    avg_humidity: { type: number }
                    avg_wind_speed: { type: number }

  # ── Admin ─────────────────────────────────────────────────────
  /admin/sync/{source}:
    post:
      operationId: adminSync
      tags: [admin]
      summary: Manual data sync
      parameters:
        - name: source
          in: path
          required: true
          schema:
            type: string
            enum: [google-poi, poi, traffic, census]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  source:
                    type: string
        "429":
          description: Cooldown active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sync/status:
    get:
      operationId: getAdminSyncStatus
      tags: [admin]
      summary: Sync cooldown status for all sources
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    ready:
                      type: boolean
                    cooldownRemaining:
                      type: integer
                    lastSync:
                      type: [string, "null"]
                      format: date-time

  # ── GTFS Upload / Feeds ───────────────────────────────────────
  /gtfs/upload:
    post:
      operationId: uploadGtfs
      tags: [gtfs-upload]
      summary: Upload a GTFS zip file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtfsUploadResult"

  /gtfs/feeds:
    get:
      operationId: getGtfsFeeds
      tags: [gtfs-upload]
      summary: List GTFS feeds
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GtfsFeed"

  /gtfs/feeds/{id}:
    delete:
      operationId: deleteGtfsFeed
      tags: [gtfs-upload]
      summary: Delete a GTFS feed (cascade)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── GTFS Queries ──────────────────────────────────────────────
  /gtfs/stops:
    get:
      operationId: getGtfsStops
      tags: [gtfs-queries]
      summary: GTFS stops (with optional route filter)
      parameters:
        - name: feedId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 2000, maximum: 5000 }
        - name: routeIds
          in: query
          schema: { type: string }
          description: Comma-separated route IDs to filter
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GtfsStop"
                  total:
                    type: integer

  /gtfs/stops/all:
    get:
      operationId: getGtfsStopsAll
      tags: [gtfs-queries]
      summary: All GTFS stops deduplicated with associated routes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        stopId: { type: string }
                        stopName: { type: string }
                        stopLat: { type: number }
                        stopLon: { type: number }
                        routes:
                          type: array
                          items: { type: string }
                  total:
                    type: integer

  /gtfs/stops/directory:
    get:
      operationId: getGtfsStopsDirectory
      tags: [gtfs-travel]
      summary: Stop directory with search
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /gtfs/stops/{stopId}/detail:
    get:
      operationId: getGtfsStopDetail
      tags: [gtfs-travel]
      summary: Detailed stop info with passing routes and timetable
      parameters:
        - name: stopId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /gtfs/routes:
    get:
      operationId: getGtfsRoutes
      tags: [gtfs-queries]
      summary: GTFS routes
      parameters:
        - name: feedId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GtfsRoute"

  /gtfs/routes/list:
    get:
      operationId: getGtfsRoutesList
      tags: [gtfs-queries]
      summary: Synthetic route list (for filters)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        routeShortName: { type: string }
                        routeLongName: { type: string }
                        routeColor: { type: [string, "null"] }

  /gtfs/routes/active-by-band:
    get:
      operationId: getGtfsRoutesActiveByBand
      tags: [gtfs-analysis]
      summary: Routes active in a time band
      parameters:
        - name: hourStart
          in: query
          schema: { type: integer, default: 0 }
        - name: hourEnd
          in: query
          schema: { type: integer, default: 27 }
        - name: day
          in: query
          schema: { type: string }
          description: "feriale | sabato | domenica"
        - name: directionId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  routeIds:
                    type: array
                    items: { type: string }

  /gtfs/routes/impact:
    get:
      operationId: getGtfsRoutesImpact
      tags: [gtfs-analysis]
      summary: Route impact analysis (POI, population, traffic)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /gtfs/routes/network-analysis:
    get:
      operationId: getGtfsRoutesNetworkAnalysis
      tags: [gtfs-analysis]
      summary: Network-wide route analysis
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /gtfs/shapes:
    get:
      operationId: getGtfsShapes
      tags: [gtfs-queries]
      summary: GTFS shapes
      parameters:
        - name: feedId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GtfsShape"

  /gtfs/shapes/geojson:
    get:
      operationId: getGtfsShapesGeojson
      tags: [gtfs-analysis]
