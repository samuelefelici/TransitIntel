      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  createdAt: { type: string, format: date-time }

  /service-program/scenarios/{id}:
    get:
      operationId: getServiceProgramScenario
      tags: [service-program]
      summary: Load a saved scenario (full data)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteServiceProgramScenario
      tags: [service-program]
      summary: Delete a service-program scenario
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Driver Shifts ─────────────────────────────────────────────
  /driver-shifts/{scenarioId}:
    get:
      operationId: getDriverShifts
      tags: [driver-shifts]
      summary: Generate driver shifts (greedy)
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: generateDriverShifts
      tags: [driver-shifts]
      summary: Generate driver shifts (greedy, POST)
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /driver-shifts/{scenarioId}/cpsat:
    post:
      operationId: runDriverShiftsCpsat
      tags: [driver-shifts]
      summary: Run CP-SAT crew scheduling (sync)
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit: { type: integer, default: 60 }
                config: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /driver-shifts/{scenarioId}/cpsat/async:
    post:
      operationId: runDriverShiftsCpsatAsync
      tags: [driver-shifts]
      summary: Launch async CP-SAT crew scheduling (returns 202 + jobId)
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit: { type: integer, default: 120 }
                config: { type: object }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
                  scenarioId: { type: string }
                  status: { type: string }
                  message: { type: string }

  /driver-shifts/jobs/{jobId}:
    get:
      operationId: getDriverShiftJob
      tags: [driver-shifts]
      summary: Poll job status
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverShiftJobStatus"

  /driver-shifts/jobs/{jobId}/stream:
    get:
      operationId: streamDriverShiftJob
      tags: [driver-shifts]
      summary: SSE progress stream for a job
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /driver-shifts/jobs/{jobId}/stop:
    post:
      operationId: stopDriverShiftJob
      tags: [driver-shifts]
      summary: Stop a running job
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
                  status: { type: string }

  /driver-shifts/{scenarioId}/compare:
    post:
      operationId: compareDriverShifts
      tags: [driver-shifts]
      summary: Compare greedy vs CP-SAT driver shifts
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeLimit: { type: integer, default: 60 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  greedy: { type: object }
                  cpsat: { type: [object, "null"] }
                  delta: { type: [object, "null"] }

  /driver-shifts/{scenarioId}/scenarios:
    get:
      operationId: getDriverShiftScenarios
      tags: [driver-shifts]
      summary: List saved driver-shift scenarios
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    createdAt: { type: string, format: date-time }
                    summary: { type: object }
    post:
      operationId: saveDriverShiftScenario
      tags: [driver-shifts]
      summary: Save a driver-shift scenario
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                result: { type: object }
                config: { type: object }
              required: [name, result]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

  /driver-shifts/{scenarioId}/scenarios/{dssId}:
    get:
      operationId: getDriverShiftScenario
      tags: [driver-shifts]
      summary: Load full driver-shift scenario
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
        - name: dssId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteDriverShiftScenario
      tags: [driver-shifts]
      summary: Delete a driver-shift scenario
      parameters:
        - $ref: "#/components/parameters/ScenarioIdPath"
        - name: dssId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Clusters ──────────────────────────────────────────────────
  /clusters:
    get:
      operationId: getClusters
      tags: [clusters]
      summary: List all stop clusters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StopCluster"
    post:
      operationId: createCluster
      tags: [clusters]
      summary: Create a stop cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStopCluster"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopCluster"

  /clusters/{id}:
    put:
      operationId: updateCluster
      tags: [clusters]
      summary: Update a cluster
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStopCluster"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopCluster"
    delete:
      operationId: deleteCluster
      tags: [clusters]
      summary: Delete a stop cluster
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted

  # ── Coincidence Zones ─────────────────────────────────────────
  /coincidence-zones:
    get:
      operationId: getCoincidenceZones
      tags: [coincidence-zones]
      summary: List all coincidence zones
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoincidenceZone"
    post:
      operationId: createCoincidenceZone
      tags: [coincidence-zones]
      summary: Create a coincidence zone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoincidenceZone"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoincidenceZone"

  /coincidence-zones/{id}:
    put:
      operationId: updateCoincidenceZone
      tags: [coincidence-zones]
      summary: Update a zone
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoincidenceZone"
    delete:
      operationId: deleteCoincidenceZone
      tags: [coincidence-zones]
      summary: Delete a coincidence zone
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted

  /coincidence-zones/hubs:
    get:
      operationId: getCoincidenceZoneHubs
      tags: [coincidence-zones]
      summary: Intermodal hubs with nearby stops
      parameters:
        - name: radius
          in: query
          schema: { type: number, default: 0.1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hubs:
                    type: array
                    items:
                      type: object

  /coincidence-zones/auto-create:
    post:
      operationId: autoCreateCoincidenceZones
      tags: [coincidence-zones]
      summary: Auto-generate zones for known hubs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                radiusKm: { type: number, default: 0.1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
                  zones:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoincidenceZone"

  /coincidence-zones/{id}/schedules:
    get:
      operationId: getCoincidenceZoneSchedules
      tags: [coincidence-zones]
      summary: Train/ferry schedules for a zone hub
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  arrivals:
                    type: array
                    items: { type: object }
                  departures:
                    type: array
                    items: { type: object }
                  hubType:
                    type: string
                  platformWalkMinutes:
                    type: integer

  /coincidence-zones/{id}/bus-lines:
    get:
      operationId: getCoincidenceZoneBusLines
      tags: [coincidence-zones]
      summary: Bus lines passing through zone stops
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  busLines:
                    type: array
                    items:
                      type: object
                      properties:
                        routeId: { type: string }
                        routeShortName: { type: string }
                        routeLongName: { type: string }
                        routeColor: { type: [string, "null"] }
                        tripsCount: { type: integer }
                        times:
                          type: array
                          items: { type: string }

  # ── Settings ──────────────────────────────────────────────────
  /settings/company-cars:
    get:
      operationId: getCompanyCars
      tags: [settings]
      summary: Get company cars count
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyCars: { type: integer }
    put:
      operationId: setCompanyCars
      tags: [settings]
      summary: Update company cars count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                companyCars: { type: integer, minimum: 0, maximum: 50 }
              required: [companyCars]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyCars: { type: integer }

# ════════════════════════════════════════════════════════════════
#  COMPONENTS
# ════════════════════════════════════════════════════════════════
components:

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string }
    ProgramIdPath:
      name: programId
      in: path
      required: true
      schema: { type: string }
    CalIdPath:
      name: calId
      in: path
      required: true
      schema: { type: string }
    ScenarioIdPath:
      name: scenarioId
      in: path
      required: true
      schema: { type: string }
    JobIdPath:
      name: jobId
      in: path
      required: true
      schema: { type: string }

  schemas:
    # ── Generic ────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error: { type: string }

    SuccessResponse:
      type: object
      properties:
        ok: { type: boolean }
        success: { type: boolean }

    # ── Health ─────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status: { type: string }
        cacheEntries: { type: integer }

    # ── Traffic ────────────────────────────────────────────────
    TrafficSnapshot:
      type: object
      properties:
        id: { type: string }
        segmentId: { type: string }
        lng: { type: number }
        lat: { type: number }
        speed: { type: number }
        freeflowSpeed: { type: number }
        congestionLevel: { type: number }
        capturedAt: { type: string, format: date-time }

    TrafficHeatmapPoint:
      type: object
      properties:
        lng: { type: number }
        lat: { type: number }
        avgCongestion: { type: number }
        sampleCount: { type: integer }

    TrafficStats:
      type: object
      properties:
        avgCongestion: { type: number }
        totalSnapshots: { type: integer }
        lastUpdated: { type: string, format: date-time }
        peakHour: { type: integer }
        congestionByHour:
          type: array
          items:
            type: object
            properties:
              hour: { type: integer }
              avgCongestion: { type: number }
        congestionByDayType:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
        zoneStats:
          type: array
          items:
            type: object
        avgSpeed: { type: number }
        avgFreeflow: { type: number }

    # ── POI ────────────────────────────────────────────────────
    Poi:
      type: object
      properties:
        id: { type: string }
        osmId: { type: [integer, "null"] }
        name: { type: string }
        category: { type: string }
        lng: { type: number }
        lat: { type: number }
        properties: { type: object }

    # ── Population ─────────────────────────────────────────────
    CensusSection:
      type: object
      properties:
        id: { type: string }
        istatCode: { type: string }
        population: { type: integer }
        areaKm2: { type: number }
        density: { type: number }
        centroidLng: { type: number }
        centroidLat: { type: number }

    # ── Stops ──────────────────────────────────────────────────
    BusStop:
      type: object
      properties:
        id: { type: string }
        code: { type: [string, "null"] }
        name: { type: string }
        lng: { type: number }
        lat: { type: number }
        lines:
          type: array
          items: { type: string }

    CreateBusStop:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        lng: { type: number }
        lat: { type: number }
        lines:
          type: array
          items: { type: string }
      required: [name, lng, lat]

    StopNearbyData:
      type: object
      properties:
        stopId: { type: string }
        nearbyPois:
          type: array
          items:
            $ref: "#/components/schemas/Poi"
        populationServed: { type: integer }
        poiCount: { type: integer }

    # ── Routes ─────────────────────────────────────────────────
    BusRoute:
      type: object
      properties:
        id: { type: string }
        lineCode: { type: [string, "null"] }
        name: { type: string }
        serviceType: { type: string }
        stopCount: { type: integer }

    CreateBusRoute:
      type: object
      properties:
        lineCode: { type: string }
        name: { type: string }
        serviceType: { type: string }
      required: [name, serviceType]

    # ── Cron ───────────────────────────────────────────────────
    CronResult:
      type: object
      properties:
        success: { type: boolean }
        inserted: { type: integer }
        message: { type: string }

    # ── GTFS ───────────────────────────────────────────────────
    GtfsFeed:
      type: object
      properties:
        id: { type: string }
        filename: { type: string }
        agencyName: { type: [string, "null"] }
        feedStartDate: { type: [string, "null"] }
        feedEndDate: { type: [string, "null"] }
        stopsCount: { type: integer }
        routesCount: { type: integer }
        tripsCount: { type: integer }
        shapesCount: { type: integer }
        uploadedAt: { type: string, format: date-time }

    GtfsUploadResult:
      type: object
      properties:
        success: { type: boolean }
        feedId: { type: string }
        stopsImported: { type: integer }
        routesImported: { type: integer }
        tripsImported: { type: integer }
        stopTimesImported: { type: integer }
        calendarRows: { type: integer }
        calendarDatesRows: { type: integer }
        shapesImported: { type: integer }
        agencyName: { type: [string, "null"] }

    GtfsStop:
      type: object
      properties:
        id: { type: string }
        feedId: { type: string }
        stopId: { type: string }
        stopName: { type: string }
        stopCode: { type: [string, "null"] }
        stopLat: { type: number }
        stopLon: { type: number }
        tripsCount: { type: integer }
        morningPeakTrips: { type: integer }
        eveningPeakTrips: { type: integer }
        serviceScore: { type: number }
        wheelchairBoarding: { type: integer }
        stopDesc: { type: [string, "null"] }

    GtfsRoute:
      type: object
      properties:
        id: { type: string }
        feedId: { type: string }
        routeId: { type: string }
        agencyId: { type: [string, "null"] }
        routeShortName: { type: [string, "null"] }
        routeLongName: { type: [string, "null"] }
        routeType: { type: integer }
        routeColor: { type: [string, "null"] }
        routeTextColor: { type: [string, "null"] }
        tripsCount: { type: integer }

    GtfsShape:
      type: object
      properties:
        id: { type: string }
        feedId: { type: string }
        shapeId: { type: string }
        routeId: { type: [string, "null"] }
        routeShortName: { type: [string, "null"] }
        routeColor: { type: [string, "null"] }
        geojson: { type: object }

    GtfsSummary:
      type: object
      properties:
        available: { type: boolean }
        totalRoutes: { type: integer }
        totalStops: { type: integer }
        totalTrips: { type: integer }
        weekdayTrips: { type: integer }
        saturdayTrips: { type: integer }
        sundayTrips: { type: integer }
        weekdayRoutes: { type: integer }
        saturdayRoutes: { type: integer }
        sundayRoutes: { type: integer }
        weekdayStops: { type: integer }
        saturdayStops: { type: integer }
        sundayStops: { type: integer }
        weekdayKm: { type: integer }
        saturdayKm: { type: integer }
        sundayKm: { type: integer }
        topRoutes:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              color: { type: string }
              trips: { type: integer }
        firstDeparture: { type: [string, "null"] }
        lastArrival: { type: [string, "null"] }

    GtfsBasicStats:
      type: object
      properties:
        totalFeeds: { type: integer }
        totalStops: { type: integer }
        totalRoutes: { type: integer }
        latestFeed:
          $ref: "#/components/schemas/GtfsFeed"

    GtfsAnalysisResult:
      type: object
      properties:
        overallScore: { type: integer }
        summary: { type: object }
        frequency: { type: object }
        routeRanking:
          type: array
          items: { type: object }
        poiCoverage: { type: object }
        populationCoverage: { type: object }
        trafficAlignment: { type: object }
        worstServed:
          type: array
          items: { type: object }

    # ── Scenarios ──────────────────────────────────────────────
    ScenarioSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        color: { type: string }
        stopsCount: { type: integer }
        lengthKm: { type: number }
        createdAt: { type: string, format: date-time }

    Scenario:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        color: { type: string }
        stopsCount: { type: integer }
        lengthKm: { type: number }
        geojson: { type: object }
        createdAt: { type: string, format: date-time }

    GenerateProgramConfig:
      type: object
      properties:
        targetKm:
          type: number
          description: Target daily km (required, > 0)
        avgSpeedKmh: { type: number }
        dwellTimeSec: { type: number }
        coincidenceZoneIds:
          type: array
          items: { type: string }
      required: [targetKm]

    ScenarioProgramSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        config: { type: object }
        createdAt: { type: string, format: date-time }

    ProgramCalendar:
      type: object
      properties:
        id: { type: string }
        programId: { type: string }
        serviceId: { type: string }
        serviceName: { type: string }
        monday: { type: boolean }
        tuesday: { type: boolean }
        wednesday: { type: boolean }
        thursday: { type: boolean }
        friday: { type: boolean }
        saturday: { type: boolean }
        sunday: { type: boolean }
        startDate: { type: string }
        endDate: { type: string }
        cadenceMultiplier: { type: number }
        isVariant: { type: boolean }
        variantConfig: { type: [object, "null"] }
        color: { type: string }
        createdAt: { type: string, format: date-time }
        exceptions:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              calendarId: { type: string }
              exceptionDate: { type: string }
              exceptionType: { type: integer }
              description: { type: [string, "null"] }

    CreateProgramCalendar:
      type: object
      properties:
        serviceId: { type: string }
        serviceName: { type: string }
        monday: { type: boolean, default: true }
        tuesday: { type: boolean, default: true }
        wednesday: { type: boolean, default: true }
        thursday: { type: boolean, default: true }
        friday: { type: boolean, default: true }
        saturday: { type: boolean, default: false }
        sunday: { type: boolean, default: false }
        startDate: { type: string }
        endDate: { type: string }
        cadenceMultiplier: { type: number, default: 1 }
        isVariant: { type: boolean, default: false }
        variantConfig: { type: [object, "null"] }
        color: { type: string }

    CalendarPreset:
      type: object
      properties:
        key: { type: string }
        serviceId: { type: string }
        serviceName: { type: string }
        days:
          type: object
          properties:
            mon: { type: boolean }
            tue: { type: boolean }
            wed: { type: boolean }
            thu: { type: boolean }
            fri: { type: boolean }
            sat: { type: boolean }
            sun: { type: boolean }
        startDate: { type: string }
        endDate: { type: string }
        cadenceMultiplier: { type: number }
        isVariant: { type: boolean }
        color: { type: string }
        exceptionsCount: { type: integer }

    GtfsValidationResult:
      type: object
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items:
            type: object
            properties:
              file: { type: string }
              field: { type: string }
              message: { type: string }
        warnings:
          type: array
          items:
            type: object
            properties:
              file: { type: string }
              field: { type: string }
              message: { type: string }
        stats:
          type: object
          properties:
            agencies: { type: integer }
            routes: { type: integer }
            trips: { type: integer }
            stops: { type: integer }
            stopTimes: { type: integer }
            shapes: { type: integer }
            calendars: { type: integer }
            calendarDates: { type: integer }

    # ── Intermodal ─────────────────────────────────────────────
    IntermodalHub:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [railway, port, park-ride] }
        lat: { type: number }
        lng: { type: number }
        description: { type: string }
        platformWalkMinutes: { type: integer }
        departures: { type: integer }
        arrivals: { type: integer }
        destinations:
          type: array
          items: { type: string }
        origins:
          type: array
          items: { type: string }

    # ── Optimizer Route ────────────────────────────────────────
    RoutePlacementRequest:
      type: object
      properties:
        scenarioId: { type: string }
        busSize:
          type: string
          enum: [mini, standard, articulated]
          default: standard
        targetInterStopKm: { type: [number, "null"] }
        maxStops: { type: integer, default: 40 }
        radiusKm: { type: number, default: 0.4 }
      required: [scenarioId]

    # ── Service Program ────────────────────────────────────────
    ServiceProgramRequest:
      type: object
      properties:
        date: { type: string }
        routes:
          type: array
          items:
            type: object
            properties:
              routeId: { type: string }
              vehicleType: { type: string }
              forced: { type: boolean }
            required: [routeId, vehicleType]
        tripVehicleOverrides:
          type: object
          additionalProperties: { type: string }
      required: [date, routes]

    ServiceProgramCpsatRequest:
      type: object
      properties:
        date: { type: string }
        routes:
          type: array
          items:
            type: object
            properties:
              routeId: { type: string }
              vehicleType: { type: string }
              forced: { type: boolean }
            required: [routeId, vehicleType]
        tripVehicleOverrides:
          type: object
          additionalProperties: { type: string }
        timeLimit: { type: integer, default: 60 }
        vehicleCosts: { type: object }
        solverIntensity: { type: string }
      required: [date, routes]

    ServiceProgramScenarioSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        date: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Driver Shifts ──────────────────────────────────────────
    DriverShiftJobStatus:
      type: object
      properties:
        jobId: { type: string }
        scenarioId: { type: string }
        status:
          type: string
          enum: [queued, running, completed, failed, stopped]
        progress: { type: number }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        data: { type: [object, "null"] }
        error: { type: [string, "null"] }

    # ── Clusters ───────────────────────────────────────────────
    StopCluster:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        transferFromDepotMin: { type: integer }
        color: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        stops:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              gtfsStopId: { type: string }
              stopName: { type: string }
              stopLat: { type: number }
              stopLon: { type: number }

    CreateStopCluster:
      type: object
      properties:
        name: { type: string }
        transferFromDepotMin: { type: integer, default: 10 }
        color: { type: string, default: "#3b82f6" }
        stops:
          type: array
          items:
            type: object
            properties:
              gtfsStopId: { type: string }
              stopName: { type: string }
              stopLat: { type: number }
              stopLon: { type: number }
      required: [name]

    # ── Coincidence Zones ──────────────────────────────────────
    CoincidenceZone:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        hubId: { type: string }
        hubName: { type: string }
        hubType: { type: string }
        hubLat: { type: number }
        hubLng: { type: number }
        walkMinutes: { type: integer }
        radiusKm: { type: number }
        color: { type: string }
        notes: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        stops:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              gtfsStopId: { type: string }
              stopName: { type: string }
              stopLat: { type: number }
              stopLon: { type: number }
              distanceKm: { type: [number, "null"] }
              walkMinFromHub: { type: [number, "null"] }

    CreateCoincidenceZone:
      type: object
      properties:
        name: { type: string }
        hubId: { type: string }
        hubName: { type: string }
        hubType: { type: string }
        hubLat: { type: number }
        hubLng: { type: number }
        walkMinutes: { type: integer }
        radiusKm: { type: number }
        color: { type: string }
        notes: { type: string }
        stops:
          type: array
          items:
            type: object
            properties:
              gtfsStopId: { type: string }
              stopName: { type: string }
              stopLat: { type: number }
              stopLon: { type: number }
              distanceKm: { type: number }
              walkMinFromHub: { type: number }
      required: [name, hubId]

    WeatherSnapshot:
      type: object
      properties:
        id: { type: string, format: uuid }
        lat: { type: number }
        lng: { type: number }
        locationName: { type: string }
        temp: { type: number, description: Temperature in Celsius }
        feelsLike: { type: number }
        humidity: { type: integer }
        windSpeed: { type: number, description: Wind speed m/s }
        weatherMain: { type: string, description: "Main weather group (Clear, Rain, Snow, etc.)" }
        weatherDescription: { type: string }
        weatherIcon: { type: string }
        rain1h: { type: [number, "null"], description: "Rain volume last 1h mm" }
        snow1h: { type: [number, "null"], description: "Snow volume last 1h mm" }
        visibility: { type: [integer, "null"], description: "Visibility in meters" }
        capturedAt: { type: string, format: date-time }
